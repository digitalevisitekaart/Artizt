<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Artizt — digitaal visitekaartje</title>

<style>

:root{
--gold:#b9975b;
--gold-dark:#a88649;
--beige:#ddd3c9;
--beige-soft:#e7dfd7;
--card:#f6f1ec;
--text:#111;
--muted:#6b635c;

--shadow:0 18px 45px rgba(120,98,67,.16);
--radius:26px;
--maxw:420px;

--tile:#f5f0eb;
--tileBorder:rgba(185,151,91,.18);
--action:#cfb07a;
--actionText:#fff;
}

*{box-sizing:border-box;}

body{
margin:0;
min-height:100svh;
display:flex;
align-items:center;
justify-content:center;
background:var(--beige);
font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
color:var(--text);
padding:22px;
}

.wrap{
width:min(var(--maxw),100%);
}

.card{
position:relative;
background:var(--card);
border-radius:var(--radius);
box-shadow:var(--shadow);
overflow:hidden;
padding:24px 18px 200px;
}

/* profiel */

.profile{
display:flex;
justify-content:center;
}

.avatar{
width:170px;
height:170px;
border-radius:999px;
overflow:hidden;
border:6px solid #f7f2ee;
box-shadow:0 12px 28px rgba(120,98,67,.16);
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

/* TITELS */

.brand{
text-align:center;
margin-top:14px;
font-size:32px;
font-weight:900;
color:var(--gold);
}

.name{
text-align:center;
font-size:22px;
font-weight:800;
margin-top:4px;
}

.subtitle{
text-align:center;
font-size:14px;
color:var(--muted);
margin-top:2px;
}

/* contact balkjes */

.tiles{
margin:22px auto 0;
max-width:360px;
display:flex;
flex-direction:column;
gap:12px;
}

.tile{
display:flex;
align-items:center;
gap:12px;
padding:12px;
border-radius:16px;
background:var(--tile);
border:1px solid var(--tileBorder);
box-shadow:0 8px 20px rgba(120,98,67,.08);
text-decoration:none;
color:inherit;
}

.tile-ico{
width:40px;
height:40px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
background:var(--beige-soft);
}

.tile-ico img{
width:18px;
}

.tile-title{
font-weight:800;
font-size:13px;
}

.tile-value{
font-weight:700;
font-size:15px;
}

.tile-sub{
font-size:12px;
color:var(--muted);
}

/* ACTIE BLOKKEN */

.quicklinks{
max-width:360px;
margin:22px auto 0;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.qlink{
aspect-ratio:1/1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:10px;
border-radius:20px;
background:var(--action);
text-decoration:none;
color:#e9e0d0;
font-weight:800;
text-align:center;
box-shadow:0 12px 28px rgba(120,98,67,.18);
padding:16px;
}

.qlink img{
width:60px;
height:60px;
object-fit:contain;
}

/* CONTACT BUTTON */

.save-wrap{
position:absolute;
left:40px;
right:40px;
bottom:120px;
z-index:5;
}

.btn{
width:100%;
padding:16px;
border:none;
background:var(--gold-dark);
color:#fff;
font-weight:900;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.btn img{
width:20px;
height:20px;
object-fit:contain;
}

/* ZEE */

.sea{
position:absolute;
left:0;
right:0;
bottom:-10px;
height:240px;
pointer-events:none;
overflow:hidden;
}

.wave-img{
position:absolute;
left:50%;
width:140%;
transform:translate3d(-50%,0,0);
}

@keyframes bobA{
0%{transform:translate3d(-50%,0,0);}
50%{transform:translate3d(-50%,-10px,0);}
100%{transform:translate3d(-50%,0,0);}
}

@keyframes bobB{
0%{transform:translate3d(-50%,0,0);}
50%{transform:translate3d(-50%,-6px,0);}
100%{transform:translate3d(-50%,0,0);}
}

@keyframes bobC{
0%{transform:translate3d(-50%,0,0);}
50%{transform:translate3d(-50%,-14px,0);}
100%{transform:translate3d(-50%,0,0);}
}

.w1{bottom:6px;opacity:.55;animation:bobB 6s ease-in-out infinite;}
.w2{bottom:-6px;opacity:.65;animation:bobA 5.4s ease-in-out infinite;}
.w3{bottom:-20px;opacity:.75;animation:bobB 4.7s ease-in-out infinite;}
.w4{bottom:-36px;opacity:.88;animation:bobA 4s ease-in-out infinite;}
.w5{bottom:-54px;opacity:1;animation:bobC 3.6s ease-in-out infinite;}

</style>
</head>

<body>

<div class="wrap">
<div class="card">

<div class="profile">
<div class="avatar">
<img src="profielfoto.png" alt="Profielfoto">
</div>
</div>

<div class="brand">Artizt</div>
<div class="name">Kim &amp; Yassine</div>
<div class="subtitle">Hair &amp; Beauty salon</div>

<div class="tiles">

<a class="tile" href="tel:+32477376121">
<div class="tile-ico"><img src="telefoon.png" alt=""></div>
<div>
<div class="tile-title">Bel nu</div>
<div class="tile-value">+32 477 37 61 21</div>
</div>
</a>

<a class="tile" href="https://www.artizt.be/" target="_blank" rel="noopener">
<div class="tile-ico"><img src="website.png" alt=""></div>
<div>
<div class="tile-title">Website</div>
<div class="tile-sub">www.artizt.be</div>
</div>
</a>

<a class="tile" href="https://www.google.com/maps?q=Molenstraat%203%209255%20Opstal" target="_blank" rel="noopener">
<div class="tile-ico"><img src="locatie.png" alt=""></div>
<div>
<div class="tile-title">Adres</div>
<div class="tile-sub">Molenstraat 3<br>9255 Opstal</div>
</div>
</a>

</div>

<div class="quicklinks">

<a class="qlink" href="https://booking.optios.net/11902/menu" target="_blank" rel="noopener">
<img src="afspraak.png" alt="">
Maak een afspraak
</a>

<a class="qlink" href="https://be.babor.com/institute/artizthairenbeauty" target="_blank" rel="noopener">
<img src="webshop.png" alt="">
Bezoek <br> webshop
</a>

</div>

<div class="save-wrap">
<button class="btn" id="saveContact" type="button">
<img src="toevoegen.png" alt="">
Contact opslaan
</button>
</div>

<div class="sea" aria-hidden="true">
<img class="wave-img w1" src="golf5.png" alt="">
<img class="wave-img w2" src="golf4.png" alt="">
<img class="wave-img w3" src="golf3.png" alt="">
<img class="wave-img w4" src="golf2.png" alt="">
<img class="wave-img w5" src="golf1.png" alt="">
</div>

</div>
</div>

<script>
const CONTACT = {
  firstName: "Kim",
  lastName: "Yassine",
  org: "Artizt",
  title: "Hair & Beauty salon",
  phone: "+32 477 37 61 21",
  website: "https://www.artizt.be/",
  addressLabel: "Molenstraat 3, 9255 Opstal, België"
};

function escapeVCardValue(value) {
  return String(value)
    .replace(/\\/g, "\\\\")
    .replace(/\n/g, "\\n")
    .replace(/,/g, "\\,")
    .replace(/;/g, "\\;");
}

function makeVCard(c){
  const lines = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    `N:${escapeVCardValue(c.lastName)};${escapeVCardValue(c.firstName)};;;`,
    `FN:${escapeVCardValue(c.firstName + " " + c.lastName)}`,
    c.org ? `ORG:${escapeVCardValue(c.org)}` : "",
    c.title ? `TITLE:${escapeVCardValue(c.title)}` : "",
    c.phone ? `TEL;TYPE=CELL,VOICE:${escapeVCardValue(c.phone)}` : "",
    c.website ? `URL:${escapeVCardValue(c.website)}` : "",
    c.addressLabel ? `ADR;TYPE=WORK:;;${escapeVCardValue(c.addressLabel)};;;;` : "",
    "END:VCARD"
  ].filter(Boolean);

  return lines.join("\r\n");
}

document.getElementById("saveContact").addEventListener("click", () => {
  const vcf = makeVCard(CONTACT);
  const blob = new Blob([vcf], { type: "text/vcard;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "Artizt_Kim_Yassine.vcf";
  document.body.appendChild(a);
  a.click();
  a.remove();

  setTimeout(() => URL.revokeObjectURL(url), 1000);
});
</script>

</body>
</html>
